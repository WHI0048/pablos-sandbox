<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pablo's Sandbox – Violet Frost Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ------------------------------
   GLOBAL RESET
--------------------------------*/
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

/* ------------------------------
   BACKGROUND LAYERS
--------------------------------*/
body {
  height: 100vh;
  overflow-x: hidden;
  background: radial-gradient(circle at center,
    #3b0a63 0%,
    #2a0845 40%,
    #0d0218 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: #eae6ff;
}

/* Pixel grid overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  opacity: 0.25;
}

/* Hyper‑arcade pulse animation */
@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 0.9; }
  100% { opacity: 0.4; }
}

body::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%,
    rgba(180, 70, 255, 0.25),
    transparent 70%);
  animation: pulse 2s infinite ease-in-out;
  pointer-events: none;
}

/* ------------------------------
   NAVIGATION (Frosted)
--------------------------------*/
nav {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 14px;
  z-index: 20;
}

nav a {
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(200,150,255,0.35);
  backdrop-filter: blur(12px);
  color: #f3eaff;
  text-decoration: none;
  font-size: 0.9rem;
  transition: 0.2s ease;
}

nav a:hover {
  background: rgba(200,150,255,0.25);
  box-shadow: 0 0 12px #c47aff;
}

/* ------------------------------
   2.0 BUTTON (Neon)
--------------------------------*/
.portal-btn {
  padding: 10px 20px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(200,150,255,0.5);
  backdrop-filter: blur(14px);
  color: #f5e8ff;
  text-decoration: none;
  font-size: 1rem;
  font-weight: 600;
  transition: 0.2s ease;
  box-shadow:
    0 0 12px rgba(150, 60, 255, 0.35),
    inset 0 0 12px rgba(150, 60, 255, 0.25);
}

.portal-btn:hover {
  background: rgba(200,150,255,0.25);
  border-color: #d7a3ff;
  box-shadow:
    0 0 18px #c47aff,
    0 0 35px #9b4dff,
    inset 0 0 18px rgba(200,150,255,0.4);
  transform: translateY(-3px);
}

/* ------------------------------
   HERO TITLE
--------------------------------*/
.hero {
  text-align: center;
  margin-bottom: 40px;
  z-index: 10;
}

.hero h1 {
  font-size: 3.4rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #f5e8ff;
  text-shadow:
    0 0 12px #b56dff,
    0 0 25px #8b3dff,
    0 0 45px #5a1aff;
}

.hero p {
  margin-top: 10px;
  font-size: 1.1rem;
  opacity: 0.8;
}

/* ------------------------------
   FROSTED GLASS PANEL
--------------------------------*/
.panel {
  width: 90%;
  max-width: 900px;
  padding: 30px;
  border-radius: 22px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(200,150,255,0.35);
  box-shadow:
    0 0 25px rgba(150, 60, 255, 0.4),
    0 0 60px rgba(120, 40, 255, 0.25);
  z-index: 10;
}

/* ------------------------------
   GAME GRID
--------------------------------*/
.game-grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.game-card {
  padding: 18px;
  border-radius: 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(200,150,255,0.4);
  backdrop-filter: blur(12px);
  text-align: center;
  cursor: pointer;
  transition: 0.2s ease;
  color: #f3eaff;
  text-decoration: none;
  font-weight: 600;
  box-shadow:
    0 0 12px rgba(150, 60, 255, 0.25),
    inset 0 0 12px rgba(150, 60, 255, 0.15);
}

.game-card:hover {
  transform: translateY(-6px) scale(1.03);
  border-color: #d7a3ff;
  box-shadow:
    0 0 18px #c47aff,
    0 0 35px #9b4dff,
    inset 0 0 18px rgba(200,150,255,0.4);
}

/* ------------------------------
   FOOTER
--------------------------------*/
footer {
  margin-top: 30px;
  text-align: center;
  opacity: 0.6;
  font-size: 0.85rem;
}
</style>
</head>

<body>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>

  <!-- NEW 2.0 BUTTON -->
  <a class="portal-btn" href="https://whi0048.github.io/pablos-portal-2.0/" target="_blank">
    2.0
  </a>
</nav>

<div class="hero">
  <h1>Pablo's Sandbox</h1>
  <p>Mini Games • Neon Worlds • Pixel Energy</p>
</div>

<div class="panel">
  <h2 style="text-align:center; margin-bottom:20px;">Mini Games Portal</h2>

  <div class="game-grid">
    <a class="game-card" href="#">Memory Game</a>
    <a class="game-card" href="#">Rock Paper Scissors</a>
    <a class="game-card" href="#">Random Number Generator</a>
  </div>
</div>

<footer>
  © 2026 Pablo’s Sandbox — Violet Frost Edition
</footer>

</body>
</html>
