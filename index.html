<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pablo's Sandbox – Violet Frost Physics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

/* BACKGROUND */
body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center,
    #3b0a63 0%,
    #2a0845 40%,
    #0d0218 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: #eae6ff;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  opacity: 0.25;
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 0.9; }
  100% { opacity: 0.4; }
}

body::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 50%,
    rgba(180, 70, 255, 0.25),
    transparent 70%);
  animation: pulse 2s infinite ease-in-out;
  pointer-events: none;
}

/* NAV + 2.0 BUTTON */
nav {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 14px;
  z-index: 20;
}

nav a {
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(200,150,255,0.35);
  backdrop-filter: blur(12px);
  color: #f3eaff;
  text-decoration: none;
  font-size: 0.9rem;
  transition: 0.2s ease;
}

nav a:hover {
  background: rgba(200,150,255,0.25);
  box-shadow: 0 0 12px #c47aff;
}

.portal-btn {
  padding: 10px 20px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(200,150,255,0.5);
  backdrop-filter: blur(14px);
  color: #f5e8ff;
  text-decoration: none;
  font-size: 1rem;
  font-weight: 600;
  transition: 0.2s ease;
  box-shadow:
    0 0 12px rgba(150, 60, 255, 0.35),
    inset 0 0 12px rgba(150, 60, 255, 0.25);
}

.portal-btn:hover {
  background: rgba(200,150,255,0.25);
  border-color: #d7a3ff;
  box-shadow:
    0 0 18px #c47aff,
    0 0 35px #9b4dff,
    inset 0 0 18px rgba(200,150,255,0.4);
  transform: translateY(-3px);
}

/* HERO */
.hero {
  text-align: center;
  margin-bottom: 24px;
  z-index: 10;
}

.hero h1 {
  font-size: 3.1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #f5e8ff;
  text-shadow:
    0 0 12px #b56dff,
    0 0 25px #8b3dff,
    0 0 45px #5a1aff;
}

.hero p {
  margin-top: 8px;
  font-size: 1rem;
  opacity: 0.8;
}

/* PANEL */
.panel {
  width: 95%;
  max-width: 1000px;
  padding: 22px 24px 26px;
  border-radius: 22px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(200,150,255,0.35);
  box-shadow:
    0 0 25px rgba(150, 60, 255, 0.4),
    0 0 60px rgba(120, 40, 255, 0.25);
  z-index: 10;
}

/* TOOLBAR */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 14px;
  align-items: center;
  justify-content: center;
}

.tool-btn {
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(200,150,255,0.5);
  background: rgba(255,255,255,0.08);
  color: #f5e8ff;
  font-size: 0.85rem;
  cursor: pointer;
  transition: 0.15s ease;
}

.tool-btn.active {
  background: rgba(200,150,255,0.3);
  box-shadow: 0 0 12px #c47aff;
}

.tool-btn:hover {
  transform: translateY(-2px);
}

/* CANVAS WRAP */
.canvas-wrap {
  display: flex;
  justify-content: center;
}

#sandbox {
  border-radius: 14px;
  border: 1px solid rgba(200,150,255,0.5);
  background: #050012;
  box-shadow:
    0 0 18px rgba(150, 60, 255, 0.4),
    inset 0 0 12px rgba(0,0,0,0.8);
}

/* FOOTER */
footer {
  margin-top: 16px;
  text-align: center;
  opacity: 0.7;
  font-size: 0.8rem;
}
</style>
</head>

<body>
<nav>
  <a href="#">Home</a>
  <a href="#">Sandbox</a>
  <a class="portal-btn" href="https://whi0048.github.io/pablos-portal-2.0/" target="_blank">2.0</a>
</nav>

<div>
  <div class="hero">
    <h1>Pablo's Sandbox</h1>
    <p>Violet Frost • Falling Powder • Liquids • Gas • Fire</p>
  </div>

  <div class="panel">
    <div class="toolbar">
      <button class="tool-btn active" data-tool="powder">Powder (Sand)</button>
      <button class="tool-btn" data-tool="liquid">Gasoline (Liquid)</button>
      <button class="tool-btn" data-tool="gas">Propane (Gas)</button>
      <button class="tool-btn" data-tool="solid">Solid Block</button>
      <button class="tool-btn" data-tool="eraser">Eraser</button>
      <button class="tool-btn" data-tool="lighter">Lighter 🔥</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="sandbox" width="240" height="160"></canvas>
    </div>

    <footer>
      Lighter: 1 in 5 chance to ignite propane gas or gasoline. Failure = sparks only.
    </footer>
  </div>
</div>

<script>
const canvas = document.getElementById("sandbox");
const ctx = canvas.getContext("2d");

const W = 120;  // grid width
const H = 80;   // grid height
const SCALE = canvas.width / W;

const EMPTY = 0;
const POWDER = 1;
const LIQUID = 2;
const GAS = 3;
const SOLID = 4;
const FIRE = 5;
const SPARK = 6;

let grid = new Array(W * H).fill(EMPTY);
let fireLife = new Array(W * H).fill(0);

let currentTool = "powder";
let mouseDown = false;

const toolButtons = document.querySelectorAll(".tool-btn");
toolButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    toolButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTool = btn.dataset.tool;
  });
});

canvas.addEventListener("mousedown", e => {
  mouseDown = true;
  handlePaint(e);
});
canvas.addEventListener("mouseup", () => mouseDown = false);
canvas.addEventListener("mouseleave", () => mouseDown = false);
canvas.addEventListener("mousemove", e => {
  if (mouseDown) handlePaint(e);
});

function handlePaint(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / SCALE);
  const y = Math.floor((e.clientY - rect.top) / SCALE);
  if (x < 0 || x >= W || y < 0 || y >= H) return;

  const idx = x + y * W;

  if (currentTool === "eraser") {
    grid[idx] = EMPTY;
    fireLife[idx] = 0;
    return;
  }

  if (currentTool === "lighter") {
    const t = grid[idx];
    if (t === GAS || t === LIQUID) {
      if (Math.random() < 0.2) {
        grid[idx] = FIRE;
        fireLife[idx] = 20 + Math.floor(Math.random() * 20);
      } else {
        grid[idx] = SPARK;
        fireLife[idx] = 5;
      }
    } else {
      grid[idx] = SPARK;
      fireLife[idx] = 3;
    }
    return;
  }

  if (currentTool === "powder") grid[idx] = POWDER;
  if (currentTool === "liquid") grid[idx] = LIQUID;
  if (currentTool === "gas") grid[idx] = GAS;
  if (currentTool === "solid") grid[idx] = SOLID;
}

function get(x, y) {
  if (x < 0 || x >= W || y < 0 || y >= H) return SOLID;
  return grid[x + y * W];
}
function set(x, y, v) {
  if (x < 0 || x >= W || y < 0 || y >= H) return;
  grid[x + y * W] = v;
}

function swap(x1, y1, x2, y2) {
  const i1 = x1 + y1 * W;
  const i2 = x2 + y2 * W;
  const tmp = grid[i1];
  grid[i1] = grid[i2];
  grid[i2] = tmp;

  const tl = fireLife[i1];
  fireLife[i1] = fireLife[i2];
  fireLife[i2] = tl;
}

function update() {
  // bottom-up for falling
  for (let y = H - 1; y >= 0; y--) {
    for (let x = 0; x < W; x++) {
      const idx = x + y * W;
      const t = grid[idx];

      if (t === POWDER) {
        if (get(x, y + 1) === EMPTY || get(x, y + 1) === GAS) {
          swap(x, y, x, y + 1);
        } else {
          const dir = Math.random() < 0.5 ? -1 : 1;
          if (get(x + dir, y + 1) === EMPTY || get(x + dir, y + 1) === GAS) {
            swap(x, y, x + dir, y + 1);
          }
        }
      }

      if (t === LIQUID) {
        if (get(x, y + 1) === EMPTY || get(x, y + 1) === GAS) {
          swap(x, y, x, y + 1);
        } else {
          const dir = Math.random() < 0.5 ? -1 : 1;
          if (get(x + dir, y) === EMPTY || get(x + dir, y) === GAS) {
            swap(x, y, x + dir, y);
          }
        }
      }

      if (t === GAS) {
        const dir = Math.random() < 0.5 ? -1 : 1;
        if (get(x, y - 1) === EMPTY) {
          swap(x, y, x, y - 1);
        } else if (get(x + dir, y - 1) === EMPTY) {
          swap(x, y, x + dir, y - 1);
        } else if (get(x + dir, y) === EMPTY) {
          swap(x, y, x + dir, y);
        }
      }

      if (t === FIRE || t === SPARK) {
        fireLife[idx]--;
        // spread fire to nearby gas/liquid
        if (t === FIRE) {
          const neighbors = [
            [x+1,y],[x-1,y],[x,y+1],[x,y-1]
          ];
          neighbors.forEach(([nx, ny]) => {
            const nt = get(nx, ny);
            if (nt === GAS || nt === LIQUID) {
              const ni = nx + ny * W;
              grid[ni] = FIRE;
              fireLife[ni] = 15 + Math.floor(Math.random() * 15);
            }
          });
        }
        if (fireLife[idx] <= 0) {
          grid[idx] = EMPTY;
          fireLife[idx] = 0;
        }
      }

      // SOLID: no movement
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const t = grid[x + y * W];
      if (t === EMPTY) continue;
      let color = "#000";
      if (t === POWDER) color = "#f5e6b3";
      if (t === LIQUID) color = "#3fa9f5";
      if (t === GAS) color = "rgba(200,200,255,0.4)";
      if (t === SOLID) color = "#8880ff";
      if (t === FIRE) color = "#ffb347";
      if (t === SPARK) color = "#ffd1ff";

      ctx.fillStyle = color;
      ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
